<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Commerce</title>
  <meta name="description" content="You look a little lost? Don't worry, let's go home.">
  <link rel="icon" href="/assets/favicon.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/assets/favicon.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
  <link rel="preload" href="/assets/fonts/Inter-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/Inter-500-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page page--404">
    <section class="page-hero page-hero--404" aria-labelledby="not-found-title">
      <header class="header">
        <nav class="header__nav" aria-label="Main navigation">
          <div class="header__nav-inner">
            <div class="header__tab header__tab--logo">
              <a href="/" class="header__logo" aria-label="Commerce home">
                <img
                  src="/assets/8AqKoqpd46BD9YOzqNcyUyqY.avif"
                  alt="Commerce"
                  width="106"
                  height="30"
                >
              </a>
              <div class="header__corner header__corner--bl header__corner--tab" aria-hidden="true">
                <svg viewBox="0 0 18 18" width="18" height="18">
                  <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
                </svg>
              </div>
              <div class="header__corner header__corner--tr header__corner--tab" aria-hidden="true">
                <svg viewBox="0 0 18 18" width="18" height="18">
                  <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
                </svg>
              </div>
            </div>

            <ul class="header__links">
              <li><a href="/shop">Shop</a></li>
              <li><a href="/collections">Collections</a></li>
              <li><a href="/blog">Blog</a></li>
              <li><a href="/support">Support</a></li>
            </ul>

            <div class="header__tab header__tab--actions">
              <div class="header__icons">
                <button class="header__icon-btn" type="button" aria-label="Search">
                  <img class="header__icon-img" src="/assets/icons/magnifying-glass.svg" alt="" width="20" height="20" aria-hidden="true">
                </button>

                <button class="header__cart-btn" type="button" aria-label="Shopping cart, 0 items">
                  <span class="header__cart-icon" aria-hidden="true"></span>
                  <span class="header__cart-count">0</span>
                </button>

                <button class="header__menu-btn" type="button" aria-label="Open menu">
                  <img class="header__icon-img" src="/assets/icons/list.svg" alt="" width="20" height="20" aria-hidden="true">
                </button>
              </div>
              <div class="header__corner header__corner--bl header__corner--tab header__corner--tab-right" aria-hidden="true">
                <svg viewBox="0 0 18 18" width="18" height="18">
                  <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
                </svg>
              </div>
              <div class="header__corner header__corner--tl header__corner--tab header__corner--tab-right" aria-hidden="true">
                <svg viewBox="0 0 18 18" width="18" height="18">
                  <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="header__corner header__corner--bl header__corner--nav" aria-hidden="true">
            <svg viewBox="0 0 18 18" width="18" height="18">
              <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
            </svg>
          </div>
          <div class="header__corner header__corner--tr header__corner--nav" aria-hidden="true">
            <svg viewBox="0 0 18 18" width="18" height="18">
              <path d="M 0 0 L 0 18 C 0 8.059 8.059 0 18 0 Z" fill="#ffffff"/>
            </svg>
          </div>
        </nav>
      </header>

      <div class="page-hero__intro">
        <span class="page-hero__badge reveal reveal--hero" data-reveal-delay="200">Page Not Found</span>

        <div class="page-hero__text">
          <h1 class="page-hero__title" id="not-found-title" data-reveal-words="hero" data-reveal-words-base-delay="150" data-words-split="true">
            <span class="reveal-word">You</span> <span class="reveal-word">look</span> <span class="reveal-word">a</span> <span class="reveal-word">little</span> <span class="reveal-word">lost?</span>
</h1>
          <p class="page-hero__subtitle" data-reveal-words="hero" data-reveal-words-base-delay="500" data-words-split="true">
            <span class="reveal-word">Don&rsquo;t</span> <span class="reveal-word">worry,</span> <span class="reveal-word">let&rsquo;s</span> <span class="reveal-word">go</span> <span class="reveal-word">home.</span>
</p>
        </div>

        <a href="/" class="hero__cta reveal reveal--hero" data-reveal-delay="800">
          <span class="hero__cta-fill" aria-hidden="true">
            <span class="hero__cta-icon">
              <span class="hero__cta-icon-rotate">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
                  <path d="M224.49,136.49l-72,72a12,12,0,0,1-17-17L187,140H40a12,12,0,0,1,0-24H187L135.51,64.48a12,12,0,0,1,17-17l72,72A12,12,0,0,1,224.49,136.49Z"/>
                </svg>
              </span>
            </span>
          </span>
          <span class="hero__cta-text">Go Home</span>
        </a>
      </div>
    </section>
  </div>

  <script src="/js/animations.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/search-cart.js"></script>
  <script src="/js/promo-modal.js"></script>
</body>
</html>
